name: ROS 2 CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.repository }}-${{ matrix.runner }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.repository }}-${{ matrix.runner }}-
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - uses: ros-industrial/industrial_ci@master
        env:
          DOCKER_IMAGE: snelsondurrant/cougars:base
          DOCKER_PULL: true
          UPSTREAM_WORKSPACE: dependencies.repos
          TARGET_WORKSPACE: .
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          TARGET_CMAKE_ARGS: >
            -DCMAKE_BUILD_TYPE=${{ matrix.runner == 'ubuntu-latest' && 'Debug' || 'Release' }}
            -DCMAKE_CXX_FLAGS="${{ matrix.runner == 'ubuntu-latest' && '--coverage' || '' }}"
            -DCMAKE_C_FLAGS="${{ matrix.runner == 'ubuntu-latest' && '--coverage' || '' }}"
          COLCON_TEST_ARGS: ${{ matrix.runner == 'ubuntu-latest' && '--pytest-args --cov --cov-report=xml' || '' }}
          AFTER_SETUP_UPSTREAM_WORKSPACE: |
            git config --global --add safe.directory "*"
            vcs custom --git --args submodule update --init --recursive
          AFTER_SCRIPT: |
            if [ "${{ matrix.runner }}" = "ubuntu-latest" ]; then
              lcov --capture --directory /root/target_ws/build --output-file /tmp/coverage.info
              lcov --remove /tmp/coverage.info '/usr/*' '*/test/*' '*/tests/*' '*/install/*' '*/build/*' --output-file $TARGET_REPO_PATH/coverage.info
              find /root/target_ws -name "coverage.xml" -exec cp --parents {} $TARGET_REPO_PATH/ \;
            fi
      - if: matrix.runner == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  trigger-upstream:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: cougars-auv/cougars-dev
          event-type: ros2_dispatch
          client-payload: '{"repo": "${{ github.repository }}", "sha": "${{ github.sha }}"}'
