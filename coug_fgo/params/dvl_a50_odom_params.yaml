dvl_a50_odom_node:
  # --- Node Settings ---
  publish_diagnostics:
    type: bool
    default_value: false
  diagnostic_timeout_sec:
    type: double
    default_value: 0.5
    validation:
      gt<>: [0.0]

  # --- ROS Topics and Frames ---
  input_topic:
    type: string
    default_value: "dvl/position"
    validation:
      not_empty<>: []
  output_topic:
    type: string
    default_value: "dvl/odometry_ned"
    validation:
      not_empty<>: []

  use_parameter_frame:
    type: bool
    default_value: false
  parameter_frame:
    type: string
    default_value: "dvl_link"
    validation:
      not_empty<>: []
  odom_frame:
    type: string
    default_value: "odom"
    validation:
      not_empty<>: []
  base_frame:
    type: string
    default_value: "base_link"
    validation:
      not_empty<>: []
