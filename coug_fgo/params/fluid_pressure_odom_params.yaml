fluid_pressure_odom_node:
  # --- Node Settings ---
  publish_diagnostics:
    type: bool
    default_value: false
  diagnostic_timeout_sec:
    type: double
    default_value: 0.5

  pressure_scale:
    type: double
    default_value: 1.0
  atmospheric_pressure:
    type: double
    default_value: 101325.0
  water_density:
    type: double
    default_value: 997.0
  gravity:
    type: double
    default_value: 9.81

  fallback_depth_noise_sigma:
    type: double
    default_value: 0.02
  max_pressure_delta:
    type: double
    default_value: 0.0

  # --- ROS Topics and Frames ---
  input_topic:
    type: string
    default_value: "pressure"
  output_topic:
    type: string
    default_value: "odometry/depth"

  use_parameter_child_frame:
    type: bool
    default_value: false
  parameter_child_frame:
    type: string
    default_value: "depth_link"
  map_frame:
    type: string
    default_value: "map"
