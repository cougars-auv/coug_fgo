seatrac_x150_imu_node:
  input_topic:
    type: string
    default_value: "modem_status"
  imu_output_topic:
    type: string
    default_value: "seatrac/imu/data_ned"
  mag_output_topic:
    type: string
    default_value: "seatrac/imu/mag"
  publish_diagnostics:
    type: bool
    default_value: false
  diagnostic_timeout:
    type: double
    default_value: 0.5

  use_parameter_frame:
    type: bool
    default_value: false
  parameter_frame:
    type: string
    default_value: "modem_link"

  accel_noise_sigmas:
    type: double_array
    default_value: [0.0078, 0.0078, 0.0078]
  gyro_noise_sigmas:
    type: double_array
    default_value: [0.0012, 0.0012, 0.0012]
  orientation_noise_sigmas:
    type: double_array
    default_value: [0.00349, 0.00349, 0.01745]
  magnetic_field_noise_sigmas:
    type: double_array
    default_value: [0.003, 0.003, 0.003]
  mag_declination_radians:
    type: double
    default_value: 0.0
